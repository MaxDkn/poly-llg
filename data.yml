    Soit $\alpha$ dans $\mathbb{R}^{+*}$. On pose :
    $$\forall n \in \mathbb{N}^*, \qquad S_n = \sum_{k=1}^n k^{\alpha}.$$
    Encadrer $S_n$ par la méthode des rectangles et en déduire que
