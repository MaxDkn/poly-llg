    Soient  $\Gamma$  le cercle de centre O et de rayon R du plan, A un point du plan. On mène par A une droite  $\Delta$  coupant  $\Gamma$  en deux points  $M_1$  et  $M_2$ .
    a) Soit  $\vec{u}$  un vecteur de norme 1. Montrer que la relation
    $$\|\overrightarrow{OA} + t\vec{u}\|^2 = R^2$$
    définit une équation du second degré en t dont on déterminera les coefficients.
    b) En déduire que le produit scalaire  $\overrightarrow{AM_1} \cdot \overrightarrow{AM_2}$  est indépendant de  $\Delta$ .
    
    Si on sait que l'équation admet deux racines réelles (éventuellement confondues)  $x_1$  et  $x_2$ , on détermine immédiatement leur signe avec les formules de Viète. En effet, le signe du quotient  $\frac{c}{a}$  permet de dire si  $x_1$  et  $x_2$  sont ou non de même signe. Dans le cas où  $x_1$  et  $x_2$  sont de même signe, c'est-à-dire si  $\frac{c}{a} > 0$ , le signe commun de  $x_1$  et  $x_2$  est celui de leur somme  $\frac{-b}{a}$ .
    Notons enfin que si  $\frac{c}{a} < 0$ , alors
    $$\Delta = b^2 - 4ac = a^2 \left( \frac{b^2}{a^2} - 4\frac{c}{a} \right) > 0.$$
    La condition  $\frac{c}{a} < 0$  équivaut donc à l'existence de deux racines réelles non nulles de signes opposés.
