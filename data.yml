    La moyenne harmonique est la « bonne » dans certaines situations. Soit un trajet de longueur d ; on parcourt la moitié de cette distance à vitesse $v_1$, l'autre avec la vitesse $v_2$. La vitesse moyenne est alors la moyenne harmonique de $v_1$ et $v_2$. En revanche, si on roule la moitié du temps à la vitesse $v_1$ et l'autre moitié du temps à la vitesse $v_2$, la vitesse moyenne est la moyenne arithmétique de $v_1$ et $v_2$.
