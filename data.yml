- num: 307
  level: 2
  content: |-
    Soient $p \in ]0,1[$, $n \in \mathbb{N}^*$. Une expérience a la probabilité $p$ de réussir. On la répète $n$ fois indépendamment. Autrement dit, on se donne $n$ variables aléatoires indépendantes $X_1, \ldots, X_n$ suivant la loi de Bernoulli de paramètre $p$. On note $T$ la variable aléatoire définie de la façon suivante (instant de premier succès) :
    - Si l'ensemble $\{i \in \{1,\dots,n\} \; ; \; X_i=1\}$ n'est pas vide, $T$ est le plus petit élément de cet ensemble. Ainsi :
    $$(T = k) = (X_1 = \dots = X_{k-1} = 0, X_k = 1)$$
    - Sinon, on pose $T = 0$.

    Quelle est la loi de $T$ ?
