    Application numérique : $n = 10^5$, $m = 200$.
- num: 276
  level: 3
  content: |-
    Un gène possède deux allèles notés $a$ et $A$. Les trois génotypes possibles sont donc $aa$, $aA$, $AA$, avec des probabilités respectives $x_1$, $2y_1$, $z_1$. Chaque allèle $a$ et $A$ a une probabilité $\frac{1}{2}$ d'être transmis. Les parents sont sélectionnés indépendamment.

    a) On note $x_2$, $2y_2$ et $z_2$ les probabilités respectives des génotypes $aa$, $aA$, $AA$ à la seconde génération. Montrer que
    $$x_2 = (x_1 + y_1)^2, \quad 2y_2 = (x_1 + z_1)(y_1 + z_1), \quad z_2 = (y_1 + z_1)^2$$
    b) Montrer que la probabilité de chaque génotype est constante à partir de la seconde génération, c'est-à-dire que, si on note $x_n$, $2y_n$ et $z_n$ les probabilités respectives des génotypes $aa$, $aA$, $AA$ à la $n$-ième génération, on a, pour tout entier $n \geq 2$ :
    $$x_n = x_2, \quad y_n = y_2, \quad z_n = z_2$$
- num: 279
  level: 4
  content: |-
    a) Soient $m \in \mathbb{N}$ et $n \in \mathbb{N}^*$. On considère $m+1$ urnes $U_0, \ldots, U_m$ telles que, pour tout $k \in \{0, \ldots, m\}$, $U_k$ contienne $k$ boules bleues et $m-k$ boules rouges. Choisissons au hasard, avec équiprobabilité, une des urnes et effectuons-y $(n+1)$ tirages avec remise. Pour $1 \leq k \leq n+1$, notons $A_{k,m}$ l'événement « pour chacun des $k$ premiers tirages, on a obtenu une boule bleue ». Exprimer $p_{n,m} = \mathbf{P}(A_{n+1,m} | A_{n,m})$.

    b) On fixe $n$. Déterminer la limite de $(p_{m,n})_{m\geq 1}$ lorsque $m$ tend vers $+\infty$. On pourra utiliser la méthode des rectangles (**8.9**).
- num: 280
  level: 5
  content: |-
