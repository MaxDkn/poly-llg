- num: 273
  level: 3
  content: |-
    Un message binaire est transmis à travers des canaux successifs. La probabilité que le message soit transmis correctement d'un opérateur à un autre est $p$, avec $0 < p < 1$. Pour $n \in \mathbb{N}^*$, soit $\pi_n$ la probabilité pour que le $n$-ième opérateur reçoive un message correct. On a donc $\pi_1 = 1$.

    a) Justifier, pour $n \in \mathbb{N}^*$, la formule
    $$\pi_{n+1} = p\pi_n + (1-p)(1-\pi_n)$$
    b) En utilisant le protocole d'étude des suites arithmético-géométriques, exprimer $\pi_n$ en fonction de $p$ et $n$. Déterminer la limite de $(\pi_n)_{n\geq 1}$.
