  content: On lance six dés non pipés. Quelle est la probabilité d'obtenir tous les nombres de 1 à 6 ?
- num: 266
  level: 1
  content: On lance un dé non pipé. On répète $n$ fois l'opération, les lancers successifs étant supposés indépendants. Quelle est la probabilité $p_n$ pour que l'on obtienne au moins un 6 ? Déterminer la limite de $(p_n)_{n\geq 1}$.
- num: 267
  level: 2
  content: |-
    a) On considère un dé non pipé. La probabilité qu'en 4 lancers, le dé amène au moins un 6 est-elle supérieure à $\frac{1}{2}$ ?
    b) On considère deux dés non pipés. La probabilité qu'en 24 lancers, les dés amènent au moins un double 6 est-elle supérieure à $\frac{1}{2}$ ?
- num: 270
  level: 2
  content: Un joueur de tennis A en affronte deux autres, B et C. On suppose que C est meilleur que B. Le joueur A gagne s'il gagne au moins deux matchs consécutifs. Quel est l'ordre qui maximise sa chance de gagner entre BCB et CBC ?
- num: 271
  level: 2
  content: Un jury comprend trois membres A, B, C. Les deux premiers prennent une décision juste avec probabilité $p$, le troisième avec probabilité $\frac{1}{2}$. Quelle est la probabilité qu'une décision juste soit prise en appliquant la règle de la majorité ?
- num: 272
  level: 2
  content: Soit $n \in \mathbb{N}^*$. Une urne contient 10 boules noires et $n$ boules blanches. Un joueur tire 20 fois successivement et avec remise une boule de l'urne, les tirages étant indépendants. Quelle est la probabilité $p_n$ d'obtenir au moins une boule blanche au cours de ces 20 tirages ? Quels sont les $n$ tels que $p_n \geq \frac{1}{2}$ ?
- num: 277
  level: 2
  content: Lors d'un examen, un étudiant a le choix entre $m$ réponses. Il connaît la réponse à la question avec probabilité $p$. S'il ignore la réponse, il choisit au hasard et de façon équiprobable parmi les $m$ réponses possibles. Sachant que l'étudiant a bien répondu, quelle est la probabilité qu'il ait connu la réponse ?
- num: 278
  level: 2
  content: Un test médical est réalisé sur une population contenant une proportion $p$ de malades. Le test n'étant pas parfait, il est positif avec probabilité $p_1$ (proche de 1) sur les malades et $p_2$ (proche de 0) sur les individus sains. Déterminer la probabilité qu'un individu sur lequel le test est positif soit effectivement malade.
- num: 281
  level: 1
