- num: 253
  level: 4
  content: |-
    Une suite qui converge vers $\ln(2)$). Soit $n$ dans $\mathbb{N}$.
    a) Montrer que, pour $t \in \mathbb{R} \setminus \{-1\}$ :
    $$\sum_{k=0}^{n} (-1)^k t^k = \frac{1}{1+t} + \frac{(-1)^n t^{n+1}}{1+t}.$$
    b) En déduire que
    $$\sum_{k=0}^{n} \frac{(-1)^k}{k+1} = \ln(2) + (-1)^n \int_0^1 \frac{t^{n+1}}{1+t} \, \mathrm{d}t.$$
    c) Montrer que
    $$0 \le \int_0^1 \frac{t^{n+1}}{1+t} \, \mathrm{d}t \le \frac{1}{n+2}.$$
    d) Conclure :
    $$\sum_{k=0}^{n} \frac{(-1)^k}{k+1} \underset{n \to +\infty}{\longrightarrow} \ln(2).$$
    e) Plus généralement, montrer que, si $0 < x < 1$, alors
    $$\sum_{k=0}^{n} \frac{(-1)^k x^{k+1}}{k+1} \underset{n \to +\infty}{\longrightarrow} \ln(1+x).$$
    Donner une estimation de la « vitesse de convergence », c'est-à-dire de l'erreur :
    $$\left| \ln(1+x) - \sum_{k=0}^{n} \frac{(-1)^k x^{k+1}}{k+1} \right|.$$
    f) Étendre ce résultat au cas $-1 < x \le 0$.
    Le résultat de la question e) a été utilisé aux débuts du calcul infinitésimal pour calculer des valeurs approchées des logarithmes. Il montre que la vitesse de convergence de la suite considérée est d'autant plus grande que $x$ est proche de 0. Ainsi, pour calculer $\ln(2)$, utiliser la formule vue en d) est maladroit : la convergence est très lente, « en $\frac{1}{n}$ », de sorte qu'il faut calculer environ 100 termes de la suite pour avoir deux chiffres significatifs. On contourne cette difficulté en écrivant $\ln(2)$ à l'aide de logarithmes de nombres proches de 1. Première idée :
    $$\ln(2) = -\ln\left(\frac{1}{2}\right).$$
    Mais il est encore plus judicieux d'observer, comme l'a fait Newton, que
    $$2 = \frac{1{,}2^2}{0{,}9 \times 0{,}8},$$
    d'où :
    $$\ln(2) = 2\ln(1{,}2) - \ln(0{,}9) - \ln(0{,}8).$$
    Puisque les trois nombres réels $0{,}8$, $0{,}9$ et $1{,}2$ sont proches de 1, les convergences correspondantes sont très rapides.
- num: 254
