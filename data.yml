    Pour $n \in \mathbb{N}$, on pose
    $$u_n = \sum_{k=0}^n \frac{1}{k!}.$$
    a) Pour $n \in \mathbb{N}$, justifier l'encadrement :
    $$0 < e - u_n < \frac{e}{(n+1)!}.$$
    b) On raisonne par l'absurde et on suppose $e$ rationnel. On peut donc écrire :
    $$e = \frac{p}{q}, \qquad (p,q) \in \mathbb{N}^{*2}.$$
    Vérifier que, pour $n \geq q$, le réel $n!(e - u_n)$ est un entier appartenant à $\left]0, \frac{e}{n+1}\right[$. Obtenir alors une contradiction. La démonstration précédente, plus sophistiquée que celle de l'irrationalité de $\sqrt{2}$, reste assez simple. Elle a été découverte par Fourier en 1815. $^{40}$ Les preuves d'irrationalité sont en fait souvent délicates. Ainsi, le nombre $\pi$ est irrationnel, mais les démonstrations de ce résultat connues actuellement sont sensiblement plus compliquées que celle de l'exercice précédent.
    La première étape de la preuve du développement en série entière de $\exp$ se généralise en la formule de Taylor avec reste intégral, qui est un résultat important de première année post-bac.
