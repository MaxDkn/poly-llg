- num: 293
  level: 4
  content: Soient $n \in \mathbb{N}^*$ et $k \in \{0, \ldots, n\}$. Un mathématicien a deux boîtes de $n$ allumettes, une dans chaque poche. Chaque fois qu'il fume, il choisit au hasard une poche avec probabilité $\frac{1}{2}$, jusqu'à se rendre compte que l'une des deux boîtes est vide. On note $X$ la variable aléatoire donnant le nombre d'allumettes restant dans l'autre boîte à cet instant. Déterminer la loi de $X$.
- num: 294
  level: 4
  content: |-
    On se donne deux dés. Pour $1 \leq i \leq 6$, on note $p_i$ (resp. $q_i$) la probabilité d'obtenir $i$ en lançant le premier dé (resp. le second). Les lancers sont supposés indépendants. On note $S$ la variable aléatoire donnant la somme des deux lancers.
    - a) Exprimer $\mathbf{P}(S = 2)$ et $\mathbf{P}(S = 12)$ en fonction de $p_1$, $q_1$, $p_6$ et $q_6$.
    - b) Exprimer $\mathbf{P}(S = 7)$ en fonction de $p_1, \ldots, p_6$ et $q_1, \ldots, q_6$, puis montrer que
    $$\mathbf{P}(S = 7) \ge 2\sqrt{\mathbf{P}(S = 2)\,\mathbf{P}(S = 12)}$$
    - c) Montrer que $S$ ne suit pas la loi uniforme sur $\{2, \ldots, 12\}$.
- num: 301
  level: 3
  content: Soient $n$ et $n'$ deux éléments de $\mathbb{N}^*$ tels que $n' \leq n$. On note $E = \{1, \ldots, n\}$, $E' = \{1, \ldots, n'\}$. On effectue $n$ tirages dans $E$ avec remise, de sorte que chaque élément de $E$ ait la probabilité $\frac{1}{n}$ d'être tiré et que les tirages soient indépendants. Soit $X$ le nombre de tirages ayant donné un élément de $E'$. Quelle est la loi de $X$ ?
- num: 302
  level: 3
  content: Une population de $n$ élèves passe un examen constitué de deux épreuves indépendantes. La probabilité de réussite à la première (resp. deuxième) épreuve est $p_1$ (resp. $p_2$). Les deux épreuves donnent des résultats indépendants. Quelle est la loi de la variable aléatoire $X$ donnant le nombre de candidats ayant réussi les deux épreuves ? On pourra écrire $X$ comme somme de variables de Bernoulli indépendantes.
- num: 303
  level: 3
  content: |-
    Soit $p \in [0,1]$. Un système de communication comporte $n$ composants. Chaque composant fonctionne avec la probabilité $p$, indépendamment des autres. Le système fonctionne si au moins la moitié des composants sont opérationnels.
    - a) Quelle est la loi du nombre de composants opérationnels ?
    - b) Si $k \in \mathbb{N}^*$, on note $\pi_k$ la probabilité pour qu'un système ayant exactement $2k-1$ composants fonctionne. Exprimer $\frac{\pi_{k+1}}{\pi_k}$.
    - c) Soit $k \in \mathbb{N}^*$. À quelle condition sur $p$ a-t-on $\pi_{k+1} \geq \pi_k$ ?
- num: 304
  level: 3
  content: On reprend les notations de l'exercice précédent. On considère deux appareils, l'un ayant deux composants, l'autre quatre. On suppose que les deux appareils ont la même probabilité de fonctionner. Déterminer $p$, puis la probabilité commune de fonctionnement.
- num: 305
  level: 3
  content: |-
    Soient $p \in ]0,1[$, $n \in \mathbb{N}^*$, $X$ une variable aléatoire suivant la loi binomiale $\mathcal{B}(n,p)$.

    a) Pour $k \in \{0, \ldots, n-1\}$, donner une expression simplifiée de
    $$u_k = \frac{\mathbf{P}(X = k+1)}{\mathbf{P}(X = k)}$$
    - b) À quelle condition le quotient précédent est-il supérieur ou égal à $1$ ?
    - c) Quelles sont la ou les valeurs de $k$ maximisant $\mathbf{P}(X=k)$ ? Expliciter le cas $p = \frac{1}{2}$.
    - d) Quelle est l'allure de l'histogramme de $X$ ?
- num: 306
  level: 4
  content: |-
    Soient $\lambda \in \mathbb{R}^+$, $(\lambda_n)_{n\geq 1}$ une suite d'éléments de $\mathbb{R}^+$ convergeant vers $\lambda$ et, pour $n \in \mathbb{N}^*$, $X_n$ une variable aléatoire suivant la loi binomiale de paramètres $n$ et $\frac{\lambda_n}{n}$. Montrer que
    $$\forall k \in \mathbb{N}, \qquad \mathbf{P}(X_n = k) \xrightarrow[n \to +\infty]{} e^{-\lambda} \frac{\lambda^k}{k!}$$
- num: 308
  level: 3
  content: |-
    On joue à pile ou face avec une pièce ayant la probabilité $p \in ]0,1[$ de donner pile. On se donne $a$ et $b$ dans $\mathbb{N}$ non tous deux nuls et une séquence $S$ de $\ell = a + b$ éléments de $\{P, F\}$, contenant $a$ lettres $P$ et $b$ lettres $F$.
    - a) Soit $m \in \mathbb{N}^*$. On lance $m\ell$ fois la pièce. Montrer que la probabilité que la séquence $S$ n'apparaisse pas est inférieure ou égale à $(1 - p^a q^b)^m$.
    - b) Soit $m \geq \ell$ un entier. On lance $n$ fois la pièce. Montrer que la probabilité que la séquence $S$ n'apparaisse pas est inférieure ou égale à $(1 - p^a q^b)^{\lfloor n/\ell \rfloor}$. Quelle est la limite de cette suite lorsque $n$ tend vers $+\infty$ ?
- num: 309
  level: 4
  content: |-
    Pour $n \in \mathbb{N}^*$, soit $p_n$ la probabilité de n'avoir jamais observé deux piles consécutifs en lançant $n$ fois une pièce équilibrée.
    - a) Calculer $p_1$ et $p_2$.
    - b) Montrer que
    $$\forall n \in \mathbb{N}^*, \qquad p_{n+2} = \frac{p_{n+1}}{2} + \frac{p_n}{4}$$
    - c) Résoudre l'équation $x^2 = \frac{x}{2} + \frac{1}{4}$. On notera $\lambda$ la racine positive, $\mu$ la racine négative.
    - d) En utilisant l'exercice 11 de **1.3**, déterminer l'ensemble $E$ des suites réelles $(u_n)_{n\geq 0}$ telles que
    $$\forall n \in \mathbb{N}, \qquad u_{n+2} = \frac{u_{n+1}}{2} + \frac{u_n}{4}$$
    - e) Pour $n \in \mathbb{N}$, exprimer $p_n$ en fonction de $n$.
- num: 310
  level: 4
  content: |-
    Soit $(X_k)_{k\geq 1}$ une suite de variables aléatoires indépendantes telle que
    $$\forall k \geq 1, \quad \mathbf{P}(X_k = 1) = p, \quad \mathbf{P}(X_k = -1) = 1 - p := q$$
    Pour $n \in \mathbb{N}^*$, soit
    $$S_n = \sum_{k=1}^n X_k$$
    a) Montrer que, si $n \in \mathbb{N}^*$, $S_n$ est à valeurs dans l'ensemble des entiers relatifs de valeur absolue bornée par $n$ et de même parité que $n$.

    b) On suppose $n$ pair : $n = 2\ell$, avec $\ell \in \mathbb{N}^*$. Montrer que la loi de $S_n$ est donnée par
    $$\forall j \in \{-\ell, \dots, \ell\}, \qquad \mathbf{P}(S_{2\ell} = 2j) = \binom{2\ell}{\ell+j} p^{\ell+j} q^{\ell-j}$$
    - c) Pour quelle valeur de $p$ la probabilité $\mathbf{P}(S_{2\ell} = 0)$ est-elle maximale ?
    - d) Montrer que
    $$\mathbf{P}(S_{2\ell} = 0) \le (4pq)^{\ell}$$
    - e) On suppose que $p \neq \frac{1}{2}$. Montrer que $4pq < 1$, puis que
    $$\mathbf{P}(S_{2\ell}=0) \underset{\ell \to +\infty}{\longrightarrow} 0$$
- num: 311
  level: 5
  content: |-
    On se place dans le cadre de l'exercice précédent, avec de plus $p = \frac{1}{2}$. Ainsi $(X_k)_{k\geq 1}$ est une suite de variables aléatoires indépendantes telle que
    $$\forall k \geq 1, \quad \mathbf{P}(X_k = 1) = \mathbf{P}(X_k = -1) = \frac{1}{2}$$
    a) En utilisant l'exercice 249 de **8.6**, montrer que
    $$\mathbf{P}(S_{2\ell}=0) \underset{\ell \to +\infty}{\longrightarrow} 0$$
    b) Soit $m \in \mathbb{N}^*$. En utilisant la question précédente et l'exercice 68 de **3.1**, montrer que
    $$\mathbf{P}(|S_{2\ell}| \le m) \xrightarrow[\ell \to +\infty]{} 0$$
- num: 314
  level: 3
  content: |-
    a) Soient $n \in \mathbb{N}^*$ et $x \in \mathbb{R}$. En utilisant la dérivation, donner une expression simple de
    $$\sum_{k=1}^{n} kx^{k-1}$$
    b) Les notations sont celles de l'exercice 307. Calculer $\mathbf{E}(T)$.
- num: 315
  level: 4
  content: |-
    On fixe un entier $a \geq 2$ et on se donne $a$ boules numérotées de $1$ à $a$ réparties dans deux boîtes. On considère l'opération suivante. À chaque seconde à partir de l'instant $0$, on choisit uniformément un entier de $\{1, a\}$ et on déplace la boule portant ce numéro d'une boîte dans l'autre. On suppose que les tirages effectués à des instants distincts sont indépendants. Si $n \in \mathbb{N}$, on note $X_n$ le nombre de boules dans la première urne à l'instant $n$ et $Y_n = X_{n+1} - X_n$.

    a) Montrer, pour $n \in \mathbb{N}$ :
    $$\mathbf{E}(Y_n) = 1 - \frac{2}{a}\,\mathbf{E}(X_n) \quad \text{et} \quad \mathbf{E}(X_{n+1}) = \left(1 - \frac{2}{a}\right)\mathbf{E}(X_n) + 1$$
    b) En utilisant le protocole d'étude des suites arithmético-géométriques, exprimer $\mathbf{E}(X_n)$ en fonction de $\mathbf{E}(X_0)$, $a$ et $n$. Déterminer la limite de $(\mathbf{E}(X_n))_{n\geq 1}$. Comment expliquer ce résultat ?
- num: 316
  level: 3
  content: |-
    Soit $X$ une variable aléatoire à valeurs dans $\mathbb{N}$.

    a) Pour $k \in \mathbb{N}$, justifier la relation
    $$\mathbf{P}(X=k) = \mathbf{P}(X \ge k) - \mathbf{P}(X \ge k+1)$$
    b) On note $n$ la plus grande valeur que prend $X$. Montrer que
    $$\mathbf{E}(X) = \sum_{k=1}^{n} \mathbf{P}(X \ge k)$$
- num: 317
  level: 3
  content: On reprend les notations de l'exercice 286 et on note $U_n$ le nombre d'expériences ayant réussi à l'instant $n$. Calculer $\mathbf{E}(U_n)$ et exprimer $N_p'$, le plus petit $n$ tel que $\mathbf{E}(U_n) \geq \frac{1}{2}$. Quelle est la limite de $p N_p'$ lorsque $p$ tend vers $0$ ?
- num: 318
  level: 4
  content: |-
    Soient $X$ une variable aléatoire à valeurs dans $\mathbb{R}^+$ et $a \in \mathbb{R}^{+*}$. Montrer que
    $$\mathbf{P}(X \ge a) \le \frac{\mathbf{E}(X)}{a}$$
- num: 319
  level: 4
  content: |-
    a) Soit $X$ une variable aléatoire réelle. En utilisant l'inégalité de Cauchy-Schwarz (**3.4**), montrer que
    $$\mathbf{E}(X)^2 \le \mathbf{E}(X^2)$$
    b) Soit $x \in [-1, 1]$. Montrer qu'il existe une variable aléatoire réelle telle que
    $$\mathbf{E}(X) = x \quad \text{et} \quad \mathbf{E}(X^2) = 1$$
    On pourra considérer les variables aléatoires à valeurs dans $\{-1, 1\}$.
- num: 321
  level: 3
  content: |-
    Soient $X$ une variable aléatoire, $n \in \mathbb{N}^*$, $X_1, \ldots, X_n$ des variables aléatoires indépendantes suivant la loi de $X$ et
    $$S_n = \sum_{k=1}^n X_k$$
    - a) Exprimer $\mathbf{E}(S_n)$ en fonction de $n$ et $\mathbf{E}(X)$.
    - b) Exprimer $\mathbf{E}(S_n^2)$ en fonction de $n$, $\mathbf{E}(X)$ et $\mathbf{E}(X^2)$.
- num: 322
  level: 3
  content: |-
    On reprend les notations de l'exercice précédent.

    a) On suppose $\mathbf{E}(X) = 0$. Montrer, en appliquant l'inégalité de Markov (exercice 318) à $S_n^2$ que, pour $a \in \mathbb{R}^{+*}$ :
    $$\mathbf{P}(|S_n| \ge a\sqrt{n}) \le \frac{\mathbf{E}(X^2)}{a^2}$$
    b) On revient au cas général. En considérant $Y := X - \mathbf{E}(X)$, montrer que, pour tout $a \in \mathbb{R}^{+*}$ :
    $$\mathbf{P}(|S_n - n\mathbf{E}(X)| \ge a\sqrt{n}) \le \frac{\mathbf{V}(X)}{a^2}$$
    où $\mathbf{V}(X) = \mathbf{E}(X^2) - \mathbf{E}(X)^2$ est la variance de $X$.
- num: 323
  level: 4
  content: On considère une assemblée de $n$ personnes. On ignore les années bissextiles. Sous les hypothèses d'indépendance des dates d'anniversaire des personnes et d'équiprobabilité de la date de naissance de chaque personne, quelle est l'espérance du nombre de paires de personnes ayant même anniversaire ? Pour $1 \le i < j \le n$, on introduira la variable aléatoire de Bernoulli $X_{i,j}$ égale à $1$ si les personnes $i$ et $j$ ont même anniversaire.
- num: 324
  level: 4
  content: Une population est formée de $2n$ individus répartis en $n$ couples. Parmi ces $2n$ individus, $m$ choisis aléatoirement et de manière équiprobable meurent. Quel est l'espérance du nombre de couples survivants ? En numérotant les couples de $1$ à $n$, on introduira, pour $1 \le i \le n$, la variable de Bernoulli $X_i$ égale à $1$ si le couple $i$ survit.
- num: 325
  level: 4
  content: |-
    Soit $n \geq 2$ un entier. Une entreprise suit la stratégie suivante pour recruter ses $n$ employés. L'employé $1$ fonde l'entreprise et recrute l'employé $2$ ; l'un des deux employés $1$ et $2$ recrute l'employé $3$ ; l'un des trois employés $1$, $2$ et $3$ recrute l'employé $4$ et ainsi de suite. On suppose que, si $1 \leq i \leq n-1$, chaque employé parmi $1, \ldots, i$ a la même probabilité de recruter l'employé $i+1$.
    - a) Si $1 \le i \le n$, quelle est la probabilité que l'employé $i$ ne recrute personne ?
    - b) Soit $N$ le nombre d'employés n'ayant recruté personne. Calculer $\mathbf{E}(N)$.
- num: 326
  level: 4
  content: On se donne $n$ boules numérotées de $1$ à $n$, $n$ urnes également numérotées de $1$ à $n$. On place une boule dans chaque urne, les choix étant équiprobables. Quelle est l'espérance du nombre de boules placées dans l'urne portant leur numéro ? Pour $1 \le i \le n$, on introduira la variable de Bernoulli $X_i$ égale à $1$ si la boule $i$ est placée dans l'urne $i$.
- num: 327
  level: 5
  content: |-
    Soient $n \in \mathbb{N}^*$, $\sigma$ une permutation aléatoire de $\{1,\ldots,n\}$ suivant la loi uniforme sur l'ensemble des $n!$ permutations de $\{1,\ldots,n\}$. Pour $1 \leq i \leq n$, on dit que $\sigma$ admet un record en $i$ si $\sigma(i)$ est strictement supérieur aux $i-1$ entiers $\sigma(1), \ldots, \sigma(i-1)$.
    - a) Si $1 \le i \le n$, soit $X_i$ la variable indicatrice de l'événement « $\sigma$ admet un record en $i$ ». Déterminer la loi de $X_i$.
    - b) Soit $N$ le nombre de records de $\sigma$. Calculer $\mathbf{E}(N)$.
- num: 328
  level: 5
  content: |-
    On reprend les notations de l'exercice 311. Pour $n \in \mathbb{N}^*$, on note $R_n$ le nombre de $k \in \{1, \ldots, n\}$ tels que $S_k = 0$.

    a) Montrer que
    $$\forall n \in \mathbb{N}^*, \qquad \mathbf{E}(R_{2n}) = \sum_{k=0}^n \frac{\binom{2k}{k}}{4^k}$$
    b) En déduire que
    $$\forall n \in \mathbb{N}^*, \qquad \mathbf{E}(R_{2n}) = \frac{(2n+1)\binom{2n}{n}}{4^n} - 1$$
    c) En utilisant l'exercice 249 de **8.6**, déterminer la limite de la suite $\left(\frac{\mathbf{E}(R_{2n})}{\sqrt{2n}}\right)_{n\geq 1}$, puis celle de la suite $\left(\frac{\mathbf{E}(R_n)}{\sqrt{n}}\right)_{n\geq 1}$.
- num: 329
  level: 5
  content: |-
    On reprend les notations de l'exercice 310 et on suppose que $p \neq \frac{1}{2}$.

    a) Montrer que
    $$\forall n \in \mathbb{N}^*, \quad \mathbf{E}(R_{2n}) = \sum_{k=0}^n \binom{2k}{k} (pq)^k$$
    b) Montrer que
    $$\forall n \in \mathbb{N}^*, \quad \mathbf{E}(R_{2n}) \le \sum_{k=0}^n (4pq)^k$$
    - c) En déduire que la suite $(\mathbf{E}(R_{2n}))_{n\geq 1}$ est majorée.
    - d) Montrer finalement que la suite $(\mathbf{E}(R_n))_{n\geq 1}$ est croissante et majorée, donc convergente.
