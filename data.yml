    Monotonie des coefficients binomiaux. Soit $n \in \mathbb{N}^*$ .
    - a) Pour $0 \le m \le n-1$ , comparer le quotient $\frac{\binom{n}{m+1}}{\binom{n}{m}}$  à 1.
    - b) En déduire que
    $$\binom{n}{0} \le \binom{n}{1} \le \dots \le \binom{n}{\left\lfloor \frac{n}{2} \right\rfloor}.$$
    c) En considérant la somme $\sum_{k=0}^{n} {n \choose k}$ , montrer que
    $$\frac{2^n}{n+1} \le \binom{n}{\left\lfloor \frac{n}{2} \right\rfloor} \le 2^n.$$
    Compte tenu de la propriété de symétrie $\binom{n}{k} = \binom{n}{n-k}$ , la suite d'inégalités ci-dessus donne, si n est fixé, le sens de variation de la suite $\left(\binom{n}{m}\right)_{0 \le m \le n}$. Cette suite est croissante jusqu'à $\lfloor \frac{n}{2} \rfloor$ , puis décroissante.
