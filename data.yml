exercices:
- num: 1
  level: 2
  content: |-
    Montrer que
    $$
    \forall n\in\mathbb{N}^{*},\qquad 1^{3}+2^{3}+\dots+n^{3}= \left(\frac{n(n+1)}{2}\right)^{2}.
    $$
- num: 2
  level: 2
  content: |-
    Montrer que, si $n\in\mathbb{N}^{*}$, il existe un entier impair $\lambda_{n}$ tel que
    $$
    5^{2^{n}} = 1 + \lambda_{n}\,2^{\,n+2}.
    $$
- num: 3
  level: 1
  content: |-
    Soient $a$ et $b$ deux réels. Soit la suite réelle $(u_n)_{n\ge 0}$ définie par
    $$
    \forall n\in\mathbb{N},\qquad u_{n+1}=a u_n+b.
    $$
    On se propose de calculer $u_n$ en fonction de $n$ et $u_0$.
    a) Traiter le cas $a=1$.
    On suppose désormais $a\neq 1$.

    b) Résoudre l’équation $x=a x+b$. On note $\ell$ la solution. Dans la question suivante, il est inutile (voire toxique) de remplacer $\ell$ par sa valeur ; seule est utile l’équation

    $$
    \ell = a\ell + b.
    $$

    c) On pose, pour $n\in\mathbb{N}$,

    $$
    v_n = u_n - \ell.
    $$

    Montrer que $(v_n)_{n\ge 0}$ est une suite géométrique. Conclure.

    d) À quelles conditions portant sur $a$ et $u_0$ la suite $(u_n)_{n\ge 0}$ est-elle convergente ?
- num: 4
  level: 1
  content: |-
    La suite réelle $(t_n)_{n\ge0}$ est définie par $t_0=1$ et
    $$
    \forall n\in\mathbb{N},\qquad t_{n+1}=\frac{\sqrt{t_n}}{e}.
    $$
    En appliquant l’exercice précédent à la suite $(\ln(t_n))_{n\ge0}$, exprimer $t_n$ en fonction de $n$ et étudier la convergence de $(t_n)_{n>0}$.
- num: 5
  level: 1
  content: |-
    La suite $(x_n)_{n\ge0}$ est définie par $x_0=1$ et, pour chaque $n\in\mathbb{N}$,
    $$
    x_{n+1}=x_0+x_1+\dots+x_n.
    $$
    Pour $n\in\mathbb{N}$, exprimer $x_n$ en fonction de $n$.
- num: 6
  level: 1
  content: |-
    Soit $c\in\mathbb{R}_{>0}$. Pour $x\in\mathbb{R}$, définissons $f(x)=\frac{x}{\sqrt{1+c x^{2}}}$.
    Calculer $f(f(x))$, $f(f(f(x)))$ et généraliser.
- num: 7
  level: 1
  content: |-
    Soit $(u_n)_{n\ge0}$ la suite définie par

    $$

    u_0 = 2,\; u_1 = 5,\qquad\text{et}\qquad \forall n\in\mathbb{N},\; u_{n+2}=5u_{n+1}-6u_n.
    $$

    Montrer que

    $$

    \forall n\in\mathbb{N},\qquad u_n = 2^{n}+3^{n}.
    $$
- num: 8
  level: 2
  content: |-
    La suite $(u_n)_{n\in\mathbb{N}}$ est définie par

    $$

    u_0 = 1,\; u_1 = 2,\qquad\text{et}\qquad \forall n\in\mathbb{N}^{*},\; u_{n+1}= \frac{u_n^{2}}{u_{n-1}}.
    $$

    « Deviner » une formule donnant $u_n$ en fonction de $n$, puis la démontrer par récurrence.
- num: 9
  level: 1
  content: |-
    Soit $(u_n)_{n\ge 0}$ la suite définie par

    $$
    u_0 = 0.
    $$

    Pour $\forall n\in\mathbb{N}$, $u_{n+1}+u_n=n$.

    Exprimer $u_n$ en fonction de $n$.
- num: 10
  level: 1
  content: |-
    La suite $(F_n)_{n\ge0}$ est celle de l’exemple 1. Pour $n\in\mathbb{N}$ on pose :

    $$

    \Delta_n = F_nF_{n+2} - F_{n+1}^2.
    $$

    a) Calculer $\Delta_n$ pour quelques valeurs de $n$, deviner une formule donnant $\Delta_n$ et la démontrer par récurrence.

    b) Calculer directement $\Delta_n$ à partir de la formule obtenue dans l’exemple 1. Pour faciliter les calculs, mieux vaut ne pas remplacer immédiatement les constantes $\alpha$ et $\beta$ par leurs expressions.

    Dans les deux exercices suivants, on donne une méthode générale pour expliciter les suites vérifiant une récurrence du type Fibonacci. Cette étude est complétée dans l exercice 435 de 11.4.
- num: 11
  level: 1
  content: |-
    Soient $a$ et $b$ deux nombres réels. On suppose que l’équation $x^{2}=a x+b$ admet deux racines réelles distinctes $\lambda$ et $\mu$. On se propose de déterminer l’ensemble $E$ des suites réelles $(u_n)_{n\ge0}$ telles que

    $$
    \forall n\in\mathbb{N},\qquad u_{n+2}=a u_{n+1}+b u_{n}.
    $$

    a) Montrer que, pour $\alpha,\beta\in\mathbb{R}$, la suite $(\alpha\lambda^{n}+\beta\mu^{n})_{n\ge0}$ appartient à $E$.

    b) Soit $(u_n)_{n\ge0}\in E$. Vérifier qu’il existe deux nombres réels $\alpha$ et $\beta$ tels que

    $$
    \alpha+\beta = u_0,\qquad \alpha\lambda+\beta\mu = u_1.
    $$

    c) Avec les notations de b), montrer que

    $$
    \forall n\in\mathbb{N},\qquad u_n = \alpha\lambda^{n} + \beta\mu^{n}.
    $$

    d) Retrouver le résultat de l exercice 7.
- num: 12
  level: 1
  content: |-
    Soient $a$ et $b$ deux nombres réels. On suppose que l’équation $x^{2}=a x+b$ admet une unique racine réelle $\lambda$. On se propose de déterminer l’ensemble $E$ des suites réelles $(u_n)_{n\ge0}$ telles que

    $$
    \forall n\in\mathbb{N},\qquad u_{n+2}=a u_{n+1}+b u_{n}.
    $$

    a) Montrer que, pour $\alpha,\beta\in\mathbb{R}$, la suite $(\alpha\lambda^{n}+\beta n\lambda^{n})_{n\ge0}$ appartient à $E$.

    b) En reprenant la méthode de l exercice précédent, montrer que, si la suite $(u_n)_{n\ge0}$ appartient à $E$, il existe deux nombres réels $\alpha$ et $\beta$ tels que

    $$
    \forall n\in\mathbb{N},\qquad u_n = \alpha\lambda^{n} + \beta n\lambda^{n}.
    $$

    L exercice suivant sera utilisé en 7.3.
- num: 13
  level: 1
  content: |-
    Soit $A\subseteq\mathbb{N}^{*}$ une partie contenant $1$ et telle que :
    i) $\forall n\in A,\;2n\in A$, et
    ii) $\forall n\in\mathbb{N}^{*},\;n+1\in A\Rightarrow n\in A$.
    a) Montrer que
    $$
    \forall m\in\mathbb{N},\qquad 2^{m}\in A.
    $$
    b) Montrer que $A = \mathbb{N}^{*}$.
- num: 14
  level: 1
  content: |-
    On se propose de montrer que tout nombre rationnel de l’intervalle $(0,1)$ s’écrit comme somme d’inverses d’entiers naturels deux à deux distincts. Ce type d’écriture, utilisé par les Égyptiens dans l’Antiquité, n’a pas un très grand intérêt, mais la preuve du résultat est un bon exemple de raisonnement par récurrence.

    a) Soit $x\in(0,1)$ un nombre rationnel. On peut alors écrire $x=\frac{m}{n}$ avec $m,n\in\mathbb{N}^{*}$ et $m<n$.

    On effectue la division euclidienne de $n$ par $m$ : il existe $q\in\mathbb{N}^{*}$ et $r\in\{0,\dots,m-1\}$ tels que

    $$

    n = q m + r.
    $$

    On suppose que $x$ n’est pas l’inverse d’un entier, c’est-à-dire que $r\neq 0$.
    Montrer que $x-\frac{1}{q}$ peut s’écrire sous la forme $\frac{m'}{n'}$ avec $n'\in\mathbb{N}^{*}$ et $1\le m' < m$.

    b) En utilisant une hypothèse de récurrence judicieuse, démontrer la propriété voulue.

    c) Constater que la démonstration précédente fournit en fait un algorithme de décomposition. Appliquer cet algorithme à $x=\frac{5}{17}$.
- num: 15
  level: 1
  content: |-
    La suite $(u_n)_{n\ge0}$ est définie par $u_0=1$ et, pour chaque $n\ge1$,

    $$

    u_n = u_{\lfloor n/2\rfloor} + u_{\lfloor n/3\rfloor} + u_{\lfloor n/6\rfloor}.
    $$

    a) Montrer que

    $$

    \forall n\in\mathbb{N},\qquad u_n\ge n+1.
    $$

    b) Trouver $C>0$ tel que

    $$

    \forall n\in\mathbb{N},\quad u_n < C\,(n+1).
    $$
- num: 16
  level: 1
  content: |-
    Soit

    $$

    S = \{2^{k}3^{\ell} \mid (k,\ell)\in\mathbb{N}^{2}\}.
    $$

    Montrer que tout élément de $\mathbb{N}^{*}$ peut s’écrire $s_{1}+\dots+s_{m}$, où $m\in\mathbb{N}^{*}$, les $s_i$ appartiennent à $S$ et, pour tout couple d’indices distincts $(i,j)$, $s_i$ ne divise pas $s_j$.
- num: 17
  level: 2
  content: |-
    Soient $a,b,c,d$ des nombres rationnels tels que

    $$

    a + b\sqrt{2}=c + d\sqrt{2}.
    $$

    Montrer que $a=c$ et $b=d$.
- num: 18
  level: 2
  content: |-
    Montrer que $\sqrt{3}$ est irrationnel. Généraliser.
- num: 19
  level: 2
  content: |-
    Montrer que $\log_{2}3$ est irrationnel. Généraliser.
- num: 20
  level: 2
  content: |-
    a) Montrer que la somme d’un nombre rationnel et d’un nombre irrationnel est irrationnelle.
    b) Montrer que le produit d’un nombre rationnel non nul et d’un nombre irrationnel est irrationnel.
    c) Trouver deux nombres irrationnels dont la somme soit rationnelle, deux nombres irrationnels dont la somme soit irrationnelle. Même question avec le produit.
- num: 21
  level: 2
  content: |-
    Montrer que $\sqrt{6}$ est irrationnel, puis en déduire que $\sqrt{2}+\sqrt{3}$ est irrationnel.
- num: 22
  level: 1
  content: |-
    Trouver les fonctions dérivables $f:\mathbb{R}^{+}\to\mathbb{R}$ telles que

    $$

    f(xy)=f(x)+f(y)\qquad\text{pour tous }x>0,\;y>0.
    $$
- num: 23
  level: 1
  content: |-
    On se propose de déterminer les fonctions $f:\mathbb{R}\to\mathbb{R}$ deux fois dérivables sur $\mathbb{R}$ telles que

    $$

    f(x+y)+f(x-y)=2\bigl(f(x)+f(y)\bigr)\qquad\forall (x,y)\in\mathbb{R}^{2}.
    $$

    Dans les parties a) et b), $f$ est une fonction solution.

    a) Calculer $f(0)$. Montrer que $f$ est paire.

    b) Montrer que $f''(x)$ est constante.

    c) Conclure.
- num: 24
  level: 1
  content: |-
    Soit $f:\mathbb{R}\to\mathbb{R}$ une fonction continue telle que

    $$

    f(x+y)=f(x)+f(y)\qquad\forall (x,y)\in\mathbb{R}^{2}.
    $$

    a) Calculer $f(0)$ et montrer que $f$ est impaire (c’est-à-dire $f(-x)=-f(x)$).

    b) Pour $n\in\mathbb{N}$ et $x\in\mathbb{R}$, calculer $f(nx)$ en fonction de $n$ et $f(x)$.

    c) Soit $a=f(1)$. Montrer que

    $$

    \forall x\in\mathbb{Q},\qquad f(x)=a x.
    $$

    d) Expliquer pourquoi tout nombre réel est limite d’une suite de nombres rationnels.

    e) Conclure que

    $$

    \forall x\in\mathbb{R},\qquad f(x)=a x.
    $$
- num: 25
  level: 1
  content: |-
    Si $a, b, c, d$ sont des nombres réels non nuls, simplifier les fractions
    $$A = \frac{\frac{a}{b}}{\frac{c}{d}}, \quad B = \frac{\frac{a}{b}}{c}, \quad C = \frac{a}{\frac{b}{c}}.$$
- num: 26
  level: 1
  content: |-
    a) Exprimer simplement $\ln(56) - \ln(7) + \ln(4)$ .
    b) Montrer que $\ln(\sqrt{216}) = \frac{3}{2}\ln(6)$ .
    c) Écrire le plus simplement possible $\ln(49) + \ln(21) - \ln(3\sqrt{7})$ .
- num: 27
  level: 1
  content: Soient $n \in \mathbb{N}^*$ , $a_1, \ldots, a_n$ des nombres réels, $b_1, \ldots, b_n$ des nombres réels non nuls. On suppose que tous les nombres $\frac{a_i}{b_i}$ , $1 \le i \le n$, sont égaux. Montrer que ces nombres sont également égaux à $\frac{a_1 + \cdots + a_n}{b_1 + \cdots + b_n}$ .
- num: 28
  level: 1
  content: Montrer que $2\sqrt{2+\sqrt{3}} = \sqrt{2} + \sqrt{6}$ .
- num: 29
  level: 1
  content: Soit $\mathbb{K}$ l'ensemble des nombres réels de la forme $a+b\sqrt{2}$ avec $(a,b)\in\mathbb{Q}^2$ . Montrer que, si x et y sont dans $\mathbb{K}$ , il en est de même de x-y, xy et, si $x\neq 0$ , de $\frac{1}{x}$ .
- num: 30
  level: 1
  content: |-
    Soient x, y, z trois nombres réels. Vérifier que
    $$(x+y+z)^3 - (x^3+y^3+z^3) = 3(x+y)(y+z)(z+x).$$
- num: 31
  level: 2
  content: Soit n le produit de quatre éléments de  $\mathbb{N}^*$  consécutifs. Montrer que n-1 est le carré d'un entier.
- num: 32
  level: 2
  content: Soient x et y deux nombres réels. En complétant un carré, donner une factorisation de  $x^4 + 4y^4$ .
- num: 33
  level: 3
  content: |-
    Soit
    $$a = \sqrt[3]{1 + \sqrt{\frac{152}{27}}} - \sqrt[3]{-1 + \sqrt{\frac{152}{27}}}.$$
    Montrer que $a^3 + 5a$  est un nombre entier.
- num: 34
  level: 3
  content: |-
    Pour $(x, y, z) \in \mathbb{R}^3$ , soit
    $$E = x^4 + y^4 + z^4 - 2x^2y^2 - 2y^2z^2 - 2z^2x^2.$$
    Factoriser $E$ en un produit de quatre facteurs.
- num: 35
  level: 4
  content: |-
    a) Pour $x \in \mathbb{R}$ , calculer $(x+3)^2 + x^2 - (x+1)^2 - (x+2)^2$ .
    b) En déduire que, pour tout $x \in \mathbb{Z}$ , il existe $m \in \mathbb{N}^*$  et $(\varepsilon_1, \dots, \varepsilon_m) \in \{-1, 1\}^m$  tel que
    $$x = \sum_{i=1}^{m} \varepsilon_i i^2.$$
    Le lecteur trouvera une explication satisfaisante dans l'exercice 440 de 11.5.
- num: 36
  level: 1
  content: Soit $n$ dans $\mathbb{N}^*$. Donner une expression simple de la somme $\sum_{k=1}^{n} (2k - 1)$ des $n$ premiers entiers impairs.
- num: 37
  level: 2
  content: |-
    Soit $(u_n)_{n \geq 0}$ une suite réelle. On suppose que
    $$\forall n \in \mathbb{N}, \qquad \sum_{k=0}^{n} u_k = \frac{n^2 + n}{3}.$$
    Pour $n \in \mathbb{N}$, calculer $u_n$.
- num: 38
  level: 3
  content: Soit $n \in \mathbb{N}^*$. On trace la table de multiplication des entiers entre 1 et $n$. On obtient donc un tableau carré comportant $n^2$ entiers naturels. Quelle est la moyenne de ces entiers ?
- num: 39
  level: 1
  content: |-
    Soit $x \in ]{-1}, 1[$. Pour $n \in \mathbb{N}$, soit $S_n = \sum_{k=0}^{n} x^k$.
    Montrer que
    $$S_n \underset{n \to +\infty}{\longrightarrow} \frac{1}{1-x}.$$
- num: 40
  level: 3
  content: |-
    a) En utilisant la formule de la progression géométrique et la dérivation, calculer, pour $x$ réel et $n$ dans $\mathbb{N}^*$ :
    $$\sum_{k=0}^{n} kx^{k}.$$
    On distinguera le cas $x = 1$.
    b) Si $x \in ]{-1}, 1[$, déterminer la limite de la somme précédente lorsque $n$ tend vers $+\infty$.
- num: 41
  level: 2
  content: |-
    On pose, pour $n$ dans $\mathbb{N}^*$ : $u_n = \sum_{k=n}^{2n} \frac{1}{k}$. Simplifier $u_{n+1} - u_n$ et en déduire la monotonie de $(u_n)_{n \geq 1}$.
- num: 42
  level: 3
  content: Pour $n \in \mathbb{N}^*$, exprimer en fonction de $n$ la somme $S_n = \sum_{k=1}^{n^2} \lfloor\sqrt{k}\rfloor$.
- num: 43
  level: 3
  content: |-
    On note $H_n$ le $n$-ième nombre harmonique, introduit dans l'exemple 5 ci-dessus. Montrer que, pour tout entier $n \geq 2$,
    $$\sum_{k=1}^{n-1} H_k = nH_n - n.$$
- num: 44
  level: 4
  content: |-
    Trouver les suites $(u_n)_{n \geq 1}$ de nombres réels strictement positifs telles que
    $$\forall n \in \mathbb{N}^*, \qquad \sum_{k=1}^n u_k^3 = \left(\sum_{k=1}^n u_k\right)^2.$$
- num: 45
  level: 3
  content: |-
    a) Si $n$ est dans $\mathbb{N}^*$, simplifier la somme
    $$\sum_{k=1}^{n} \ln \left( 1 + \frac{1}{k} \right).$$
    Quelle est la limite de cette expression lorsque $n$ tend vers $+\infty$ ?
    b) Si $n$ est un entier $\geq 2$, simplifier la somme
    $$\sum_{k=2}^{n} \ln \left( 1 - \frac{1}{k^2} \right).$$
    Quelle est la limite de cette expression lorsque $n$ tend vers $+\infty$ ?
- num: 46
  level: 4
  content: |-
    Déterminer trois réels $a, b, c$ tels que
    $$\forall x \in \mathbb{R} \setminus \{0, -1, -2\}, \qquad \frac{1}{x(x+1)(x+2)} = \frac{a}{x} + \frac{b}{x+1} + \frac{c}{x+2}.$$
    En déduire, pour $n$ dans $\mathbb{N}^*$, une expression simple de
    $$U_n = \sum_{k=1}^n \frac{1}{k(k+1)(k+2)}.$$
    Quelle est la limite de $(U_n)_{n \geq 1}$ lorsque $n$ tend vers $+\infty$ ?
- num: 47
  level: 3
  content: |-
    a) Trouver trois réels a, b, c tels que, si :
    $$P : x \in \mathbb{R} \mapsto ax^3 + bx^2 + cx,$$
    on ait
    $$\forall x \in \mathbb{R}, \qquad P(x) - P(x-1) = x^2.$$
    En déduire une expression simple de $\sum_{k=1}^{n} k^2$.
    b) Adapter cette méthode pour calculer $\sum_{k=1}^{n} k^3$.
    
    **Remarque** Somme des puissances $p$-ièmes des $n$ premiers entiers naturels. On a rencontré dans les pages précédentes les trois formules :
    $$\sum_{k=1}^{n} k = \frac{n(n+1)}{2}, \qquad \sum_{k=1}^{n} k^2 = \frac{n(n+1)(2n+1)}{6}, \qquad \sum_{k=1}^{n} k^3 = \left(\frac{n(n+1)}{2}\right)^2.$$
    Pour $p$ et $n$ dans $\mathbb{N}^*$, soit plus généralement
    $$S_{p,n} = \sum_{k=1}^{n} k^p$$
    la somme des puissances $p$-ièmes des $n$ premiers entiers. Au début du dix-septième siècle, Johann Faulhaber a généralisé les formules précédentes et prouvé que, pour tout $p \in \mathbb{N}$, il existe un polynôme $F_p$ tel que :
    $$\forall n \in \mathbb{N}^*, \qquad S_{p,n} = F_p(n).$$
    Le terme de plus haut degré de $F_p$ est $\frac{x^{p+1}}{p+1}$, ce qui est cohérent avec les résultats obtenus pour $p = 1$, $p = 2$, $p = 3$. Nous démontrerons ces résultats en **11.2**. Nous définirons à cet effet les polynômes de Bernoulli, introduits par Jacob Bernoulli vers 1650, qui interviennent dans beaucoup d'autres questions mathématiques.
- num: 48
  level: 3
  content: |-
    Soient $(v_n)_{n \geq 0}$ une suite réelle, $a$ un réel différent de 0 et de 1, $(u_n)_{n \geq 0}$ une suite telle que
    $$\forall n \in \mathbb{N}, \qquad u_{n+1} = au_n + v_n.$$
    On pose
    $$\forall n \in \mathbb{N}, \qquad u_n' = \frac{u_n}{a^n}.$$
    - a) Si $n \in \mathbb{N}$, simplifier $u'_{n+1} - u'_n$.
    - b) En déduire une expression sommatoire de $u'_n$, puis de $u_n$.
- num: 49
  level: 2
  content: |-
    Donner une forme simple de $\sum_{k=1}^{n} (k \times k!)$. On pourra utiliser l'égalité :
    $$k \times k! = (k+1)! - k!$$
- num: 50
  level: 2
  content: Par une méthode analogue à celle de l'exercice précédent, donner une forme simple de $\sum_{k=1}^{n} \frac{k}{(k+1)!}$.
- num: 51
  level: 3
  content: |-
    Pour $j$ dans $\mathbb{N}^*$ et $x$ dans $\mathbb{R}$, on pose :
    $$H_j(x) = x(x+1)\dots(x+j-1).$$
    - a) Pour $j$ dans $\mathbb{N}^*$ et $x$ dans $\mathbb{R}$, calculer $H_{j+1}(x) - H_{j+1}(x-1)$.
    - b) En déduire, pour $j$ et $n$ dans $\mathbb{N}^*$, la somme $\sum_{k=1}^{n} H_j(k)$.
    - c) Retrouver les sommes $\sum_{k=1}^{n} k^2$ et $\sum_{k=1}^{n} k^3$ à l'aide de la question b).
    
    Vous pouvez vous y essayer seul en écrivant un système et en identifiant les coefficients des polynômes.
- num: 52
  level: 4
  content: |-
    Une somme de coefficients binomiaux. Soient r et n deux entiers naturels tels que $r \le n$ ,
    $$S_{k,n} = \sum_{k=r}^{n} \binom{k}{r}.$$
    a) En utilisant la relation de Pascal :
    $$\binom{k+1}{r+1} = \binom{k}{r} + \binom{k}{r+1},$$
    valable pour k et n dans $\mathbb{N}$  avec $r+1 \leq k$ , exprimer $S_{k,n}$  comme un coefficient binomial.
    b) Retrouver le résultat obtenu en employant un raisonnement combinatoire.
- num: 53
  level: 1
  content: |-
    a) Pour n dans $\mathbb{N}^*$ , simplifier le produit
    $$A_n = \prod_{k=1}^n 4^{k^2 + 1}.$$
    b) Pour n dans $\mathbb{N}^*$ , simplifier le produit
    $$B_n = \prod_{k=0}^n \frac{k+4}{k+3}.$$
- num: 54
  level: 2
  content: Soit $n \in \mathbb{N}^*$ . Quel est le produit des $n^2$  entiers apparaissant dans la table de multiplication des entiers entre 1 et n?
- num: 55
  level: 3
  content: |-
    Pour $n \geq 2$ , donner une expression simple de
    $$C_n = \prod_{k=2}^n \left(1 - \frac{1}{k^2}\right)$$
    et trouver la limite de $(C_n)_{n\geq 1}$  lorsque n tend vers $+\infty$ .
- num: 56
  level: 1
  content: |-
    Soient a, b deux nombres réels, a', b', m, n quatre nombres réels strictement positifs tels que $\frac{a}{a'} > \frac{b}{b'}$ . Montrer que
    $$\frac{b}{b'} < \frac{ma + nb}{ma' + nb'} < \frac{a}{a'}.$$
- num: 57
  level: 2
  content: |-
    Soient a, b, c des éléments de $[0, 1]$.
    - a) Montrer que $(ab - 1)(bc - 1)(ca - 1) \le 0$ .
    - b) En déduire que
    $$a + b + c + \frac{1}{abc} \ge \frac{1}{a} + \frac{1}{b} + \frac{1}{c} + abc.$$
- num: 58
  level: 2
  content: Soient x et y deux éléments de $]{-1},1[$. Montrer que le nombre réel $z=\frac{x+y}{1+xy}$  appartient à $]{-1},1[$.
- num: 59
  level: 2
  content: |-
