    Nombre de racines de $P' - \alpha P$ si $P$ est un polynôme réel de degré $n$ ayant $n$ racines distinctes \*). Soient $n \in \mathbb{N}^*$, $a_1 < \cdots < a_n$ des réels et $P$ la fonction polynôme définie par :
